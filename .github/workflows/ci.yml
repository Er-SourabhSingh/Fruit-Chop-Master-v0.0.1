name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  quality:
    name: Lint + Smoke (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Lint with Ruff
        run: ruff check .

      - name: Verify all files compile
        run: python -m compileall -q .

      - name: Headless Pygame smoke test
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
          PYGAME_HIDE_SUPPORT_PROMPT: "1"
        run: |
          python - <<'PY'
          import pygame
          from game_manager import GameManager

          pygame.mixer.pre_init(44100, -16, 2, 512)
          pygame.init()
          screen = pygame.display.set_mode((640, 360))
          manager = GameManager(screen)
          assert manager.state == "start"
          pygame.quit()
          print("Headless smoke check passed")
          PY

      - name: Run pytest when tests exist
        run: |
          if [ -d tests ]; then
            pytest -q
          else
            echo "No tests directory found. Skipping pytest."
          fi
